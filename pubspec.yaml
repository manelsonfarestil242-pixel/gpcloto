name: gpcloto
description: GPCLOTO - Application de loterie officielle GPC
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State management
  provider: ^6.1.1
  
  # Navigation
  go_router: ^13.2.0
  
  # HTTP & API
  http: ^1.2.0
  dio: ^5.4.3+1
  
  # Local storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0
  
  # UI
  font_awesome_flutter: ^10.7.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  
  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0
  
  # Printing (ESC/POS)
  esc_pos_utils: ^1.1.0
  
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  
  assets:
    - assets/img/
  
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-ExtraBold.ttf
          weight: 800
